<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="description" content="Ask your database in plain English — a local-first natural-language-to-SQL tool." />
    <meta name="theme-color" content="#10b981" />
    <title>Sibyl — ask your database in plain English</title>
    <script>
      // Set the theme class before first paint (no flash). Default dark; honor a
      // saved choice, else the system preference.
      (function () {
        try {
          var saved = localStorage.getItem('sibyl-theme')
          var dark = saved ? saved === 'dark' : !matchMedia('(prefers-color-scheme: light)').matches
          document.documentElement.classList.toggle('dark', dark)
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
