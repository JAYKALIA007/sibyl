packages:
  - web

# Supply-chain cooldown: refuse any dependency version published less than a day
# ago, so the typical npm-compromise wave (malicious versions yanked within hours)
# never lands in an install. Setting this explicitly also turns on strict mode —
# resolution fails rather than silently falling back to a too-new version.
minimumReleaseAge: 1440

# esbuild (via Vite/tsup) has a postinstall build script. pnpm 11 blocks unapproved
# build scripts and, under strict mode, escalates that block to a fatal
# ERR_PNPM_IGNORED_BUILDS on fresh installs (e.g. CI). The old `onlyBuiltDependencies`
# allowlist is not honored by our pinned pnpm 11.1.3 for these transitive esbuilds, so
# we downgrade the block to a warning instead. Safe: esbuild's platform binary ships
# via the @esbuild/<platform> optional dependency, so the build works without its
# postinstall running.
strictDepBuilds: false

# Don't auto-run `pnpm install` before every `pnpm run <script>`. We manage installs
# explicitly, and the pre-run check otherwise hard-fails on the (harmless) esbuild
# build-script notice under pnpm 11.
verifyDepsBeforeRun: false
